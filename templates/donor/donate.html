{% extends "base.html" %}

{% block content %}
<div class="max-w-3xl mx-auto py-8 px-4 sm:px-6 lg:px-8 w-full flex-grow transition-colors duration-300">

    <div class="md:flex md:items-center md:justify-between mb-8 animate-fade-in-up">
        <div class="flex-1 min-w-0">
            <h2 class="text-3xl font-bold font-heading leading-7 text-gray-900 dark:text-white sm:truncate">
                Create New Donation
            </h2>
            <p class="mt-2 text-sm text-gray-500 dark:text-gray-400">
                Provide details about what you are donating to help NGOs find what they need.
            </p>
        </div>
        <div class="mt-4 flex md:mt-0 md:ml-4">
            <a href="{{ url_for('donor.dashboard') }}"
                class="inline-flex items-center px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg shadow-sm text-sm font-medium text-gray-700 dark:text-gray-300 bg-white dark:bg-dark-panel hover:bg-gray-50 dark:hover:bg-dark-bg transition-colors">
                <i class="fa-solid fa-arrow-left mr-2"></i> Cancel
            </a>
        </div>
    </div>

    <div class="glass-panel p-8 shadow-xl rounded-2xl animate-fade-in-up" style="animation-delay: 0.1s;">
        <form action="{{ url_for('donor.create_donation') }}" method="POST" class="space-y-8">

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Item Type <span class="text-brand-500">*</span></label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400 dark:text-gray-500">
                            <i class="fa-solid fa-tags"></i>
                        </div>
                        <select id="item_type" name="item_type" required
                            class="block w-full pl-10 pr-10 py-2.5 text-base border-gray-300 dark:border-dark-border focus:outline-none focus:ring-brand-500 focus:border-brand-500 sm:text-sm rounded-lg bg-white dark:bg-dark-bg dark:text-white transition-colors border shadow-sm appearance-none">
                            <option value="Food">Food / Meals</option>
                            <option value="Medicine">Medicine</option>
                            <option value="Sanitary">Sanitary Items</option>
                            <option value="Other">Other Essential</option>
                        </select>
                        <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none text-gray-400">
                            <i class="fa-solid fa-chevron-down text-xs"></i>
                        </div>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Quantity Description <span class="text-brand-500">*</span></label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400 dark:text-gray-500">
                            <i class="fa-solid fa-scale-balanced"></i>
                        </div>
                        <input type="text" name="quantity_desc" required placeholder="e.g. 5 boxes, 10 kg, 50 strips"
                            class="block w-full pl-10 border border-gray-300 dark:border-dark-border rounded-lg shadow-sm py-2.5 px-3 focus:outline-none focus:ring-brand-500 focus:border-brand-500 sm:text-sm bg-white dark:bg-dark-bg dark:text-white dark:placeholder-gray-500 transition-colors">
                    </div>
                </div>
            </div>

            <!-- Dynamic Food Fields -->
            <div id="food_fields" class="bg-gray-50 dark:bg-dark-bg/50 p-5 rounded-xl border border-gray-200 dark:border-dark-border/80 space-y-5 transition-all">
                <div class="flex items-center gap-2 border-b border-gray-200 dark:border-dark-border pb-3">
                    <div class="w-8 h-8 rounded-full bg-orange-100 dark:bg-orange-900/30 text-orange-500 flex items-center justify-center">
                        <i class="fa-solid fa-kitchen-set"></i>
                    </div>
                    <h4 class="text-md font-bold font-heading text-gray-900 dark:text-white">Food Specific Details</h4>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Dietary Type</label>
                        <select name="is_veg"
                            class="block w-full border-gray-300 dark:border-dark-border focus:outline-none focus:ring-brand-500 focus:border-brand-500 sm:text-sm rounded-lg bg-white dark:bg-dark-panel dark:text-white transition-colors border py-2.5 px-3 shadow-sm">
                            <option value="True">Vegetarian</option>
                            <option value="False">Non-Vegetarian</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Feeds How Many People?</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400 dark:text-gray-500">
                                <i class="fa-solid fa-users"></i>
                            </div>
                            <input type="number" name="feeds_people" min="1" placeholder="e.g. 10"
                                class="block w-full pl-10 border border-gray-300 dark:border-dark-border rounded-lg shadow-sm py-2.5 px-3 focus:outline-none focus:ring-brand-500 focus:border-brand-500 sm:text-sm bg-white dark:bg-dark-panel dark:text-white transition-colors">
                        </div>
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1 flex items-center gap-1">
                            Expiry Time <span class="text-xs text-gray-500 dark:text-gray-400 font-normal">(Important for cooked food)</span>
                        </label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400 dark:text-gray-500">
                                <i class="fa-regular fa-clock"></i>
                            </div>
                            <input type="datetime-local" name="expiry_time"
                                class="block w-full pl-10 border border-gray-300 dark:border-dark-border rounded-lg shadow-sm py-2.5 px-3 focus:outline-none focus:ring-brand-500 focus:border-brand-500 sm:text-sm bg-white dark:bg-dark-panel dark:text-white transition-colors [color-scheme:light] dark:[color-scheme:dark]">
                        </div>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 pt-2">
                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Pickup Address <span class="text-brand-500">*</span></label>
                    <div class="relative">
                        <div class="absolute top-3 left-3 flex items-start pointer-events-none text-gray-400 dark:text-gray-500">
                            <i class="fa-solid fa-location-dot mt-0.5"></i>
                        </div>
                        <!-- Pre-fill with user's address -->
                        <textarea name="pickup_address" required rows="3"
                            class="block w-full pl-10 border border-gray-300 dark:border-dark-border rounded-lg shadow-sm py-2.5 px-3 focus:outline-none focus:ring-brand-500 focus:border-brand-500 sm:text-sm bg-white dark:bg-dark-bg dark:text-white transition-colors resize-none">{{ current_user.donor_profile.address }}</textarea>
                    </div>
                </div>
                
                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Preferred Pickup Date & Time <span class="text-brand-500">*</span></label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400 dark:text-gray-500">
                            <i class="fa-regular fa-calendar-check mt-0.5"></i>
                        </div>
                        <input type="datetime-local" name="pickup_datetime" required
                            class="block w-full pl-10 border border-gray-300 dark:border-dark-border rounded-lg shadow-sm py-2.5 px-3 focus:outline-none focus:ring-brand-500 focus:border-brand-500 sm:text-sm bg-white dark:bg-dark-bg dark:text-white transition-colors [color-scheme:light] dark:[color-scheme:dark]">
                    </div>
                </div>
                
                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Additional Notes</label>
                    <div class="relative">
                        <div class="absolute top-3 left-3 flex items-start pointer-events-none text-gray-400 dark:text-gray-500">
                            <i class="fa-regular fa-clipboard mt-0.5"></i>
                        </div>
                        <textarea name="notes" rows="3" placeholder="Any instructions for pickup or item details."
                            class="block w-full pl-10 border border-gray-300 dark:border-dark-border rounded-lg shadow-sm py-2.5 px-3 focus:outline-none focus:ring-brand-500 focus:border-brand-500 sm:text-sm bg-white dark:bg-dark-bg dark:text-white dark:placeholder-gray-500 transition-colors resize-none"></textarea>
                    </div>
                </div>
            </div>

            <div class="pt-6 border-t border-gray-200 dark:border-dark-border">
                <button type="submit"
                    class="w-full flex justify-center items-center py-3.5 px-4 border border-transparent rounded-lg shadow-md text-base font-medium text-white bg-brand-600 hover:bg-brand-700 dark:bg-brand-500 dark:hover:bg-brand-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-500 dark:focus:ring-offset-dark-panel transition-all hover:shadow-lg hover:-translate-y-0.5 active:translate-y-0">
                    <i class="fa-solid fa-paper-plane mr-2"></i> Post Donation
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.getElementById('item_type').addEventListener('change', function () {
        const foodFields = document.getElementById('food_fields');
        if (this.value === 'Food') {
            foodFields.style.opacity = '0';
            foodFields.style.display = 'block';
            setTimeout(() => {
                foodFields.style.opacity = '1';
            }, 10);
            
            // Re-enable required fields if needed
        } else {
            foodFields.style.opacity = '0';
            setTimeout(() => {
                foodFields.style.display = 'none';
                // Clear out food specific fields
                foodFields.querySelectorAll('input').forEach(i => i.value = '');
            }, 300);
        }
    });

    // Initialize state
    window.addEventListener('DOMContentLoaded', () => {
        const select = document.getElementById('item_type');
        const foodFields = document.getElementById('food_fields');
        if (select.value !== 'Food') {
            foodFields.style.display = 'none';
        }
    });
</script>
{% endblock %}
