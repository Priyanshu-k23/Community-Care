{% extends "base.html" %}

{% block content %}
<div class="flex-grow flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 bg-transparent transition-colors duration-300">
    <div class="max-w-4xl w-full flex flex-col md:flex-row glass-panel rounded-3xl overflow-hidden animate-fade-in-up shadow-2xl !p-0">
        <!-- Image Panel -->
        <div class="hidden md:block md:w-1/2 relative bg-brand-50 dark:bg-dark-bg">
            <img src="{{ url_for('static', filename='images/hero_image.png') }}" alt="ShareCare Login" class="absolute inset-0 h-full w-full object-cover">
            <div class="absolute inset-0 bg-gradient-to-t from-brand-900/60 to-transparent"></div>
        </div>
        
        <!-- Form Panel -->
        <div class="w-full md:w-1/2 p-8 sm:p-12 flex flex-col justify-center space-y-8">
        <div>
            <h2 class="mt-2 text-center text-3xl font-extrabold text-gray-900 dark:text-white font-heading">
                Welcome back
            </h2>
            <p class="mt-2 text-center text-sm text-gray-600 dark:text-gray-400">
                Sign in to your ShareCare account
            </p>
        </div>
        <form class="mt-8 space-y-6" action="{{ url_for('auth.login') }}" method="POST">
            <div class="rounded-md shadow-sm -space-y-px">
                <div>
                    <label for="email-address" class="sr-only">Email address</label>
                    <input id="email-address" name="email" type="email" autocomplete="email" required
                        class="appearance-none rounded-none relative block w-full px-3 py-3 border border-gray-300 dark:border-gray-600 placeholder-gray-500 dark:placeholder-gray-400 text-gray-900 dark:text-white dark:bg-dark-bg rounded-t-lg focus:outline-none focus:ring-brand-500 focus:border-brand-500 focus:z-10 sm:text-sm transition-colors"
                        placeholder="Email address">
                </div>
                <div>
                    <label for="password" class="sr-only">Password</label>
                    <input id="password" name="password" type="password" autocomplete="current-password" required
                        class="appearance-none rounded-none relative block w-full px-3 py-3 border border-gray-300 dark:border-gray-600 placeholder-gray-500 dark:placeholder-gray-400 text-gray-900 dark:text-white dark:bg-dark-bg focus:outline-none focus:ring-brand-500 focus:border-brand-500 focus:z-10 sm:text-sm transition-colors"
                        placeholder="Password">
                </div>
                <div>
                    <label for="role" class="sr-only">Role</label>
                    <select id="role" name="role" required
                        class="appearance-none rounded-none relative block w-full px-3 py-3 border border-gray-300 dark:border-gray-600 text-gray-900 dark:text-white dark:bg-dark-bg rounded-b-lg focus:outline-none focus:ring-brand-500 focus:border-brand-500 focus:z-10 sm:text-sm transition-colors">
                        <option value="donor">Donor</option>
                        <option value="ngo">NGO</option>
                        <option value="volunteer">Volunteer</option>
                        <option value="admin">Administrator</option>
                    </select>
                </div>
            </div>

            <div>
                <button type="submit"
                    class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-lg text-white bg-brand-600 hover:bg-brand-700 dark:bg-brand-500 dark:hover:bg-brand-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-500 shadow-lg shadow-brand-500/30 transition-all duration-300 transform hover:-translate-y-1">
                    <span class="absolute left-0 inset-y-0 flex items-center pl-3">
                        <i class="fa-solid fa-lock text-brand-300 group-hover:text-white transition-colors"></i>
                    </span>
                    Sign in
                </button>
            </div>

            <div class="text-sm text-center mt-4 pt-4 border-t border-gray-200 dark:border-dark-border">
                <a href="{{ url_for('auth.register') }}" class="font-medium text-brand-600 hover:text-brand-500 dark:text-brand-400 dark:hover:text-brand-300">
                    Don't have an account? <span class="underline">Sign up</span>
                </a>
            </div>
        </form>
        </div>
    </div>
</div>
{% endblock %}
